<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Invest - 종목 추천 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            line-height: 1.6;
        }

        /* 헤더 */
        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 20px; font-weight: 600; }
        header .meta {
            font-size: 13px;
            color: #8b949e;
        }
        .refresh-btn {
            background: #238636;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .refresh-btn:hover:not(:disabled) { background: #2ea043; }
        .refresh-btn:disabled {
            background: #30363d;
            color: #484f58;
            cursor: not-allowed;
        }

        /* 레이아웃 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 카드 그리드 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        .card h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #c9d1d9;
        }

        /* 지수 카드 */
        .index-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .index-item {
            text-align: center;
            padding: 12px 8px;
            background: #0d1117;
            border-radius: 6px;
        }
        .index-item .label {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 4px;
        }
        .index-item .value {
            font-size: 20px;
            font-weight: 700;
        }

        /* 등락 색상 */
        .up { color: #f85149; }
        .down { color: #58a6ff; }
        .flat { color: #8b949e; }

        /* 섹터 바 */
        .sector-list { list-style: none; }
        .sector-item {
            display: flex;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
        }
        .sector-item:last-child { border-bottom: none; }
        .sector-name {
            width: 50px;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .sector-bar-wrap {
            flex: 1;
            height: 20px;
            background: #0d1117;
            border-radius: 3px;
            margin: 0 10px;
            position: relative;
            overflow: hidden;
        }
        .sector-bar {
            height: 100%;
            border-radius: 3px;
            min-width: 2px;
            transition: width 0.3s;
        }
        .sector-bar.positive { background: #f8514980; }
        .sector-bar.negative { background: #58a6ff60; }
        .sector-pct {
            width: 60px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* 키워드 태그 */
        .keyword-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keyword-tag {
            background: #1f2937;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 13px;
        }
        .keyword-tag .count {
            color: #f0883e;
            font-weight: 600;
            margin-left: 4px;
        }

        /* 추천 테이블 */
        .rec-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .rec-table thead {
            background: #0d1117;
        }
        .rec-table th {
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #30363d;
        }
        .rec-table td {
            padding: 12px;
            border-bottom: 1px solid #21262d;
        }
        .rec-table tr:hover {
            background: #1c2028;
        }
        .rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 13px;
        }
        .rank-1 { background: #ffd700; color: #000; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #fff; }
        .rank-other { background: #30363d; color: #8b949e; }
        .stock-name {
            font-weight: 600;
        }
        a.stock-link {
            color: inherit;
            text-decoration: none;
        }
        a.stock-link:hover {
            color: #58a6ff;
            text-decoration: underline;
        }
        .stock-code {
            font-size: 12px;
            color: #8b949e;
            margin-left: 6px;
        }
        .score-bar {
            display: inline-block;
            height: 8px;
            border-radius: 4px;
            margin-right: 8px;
            vertical-align: middle;
        }
        .score-sector { background: #3fb950; }
        .score-theme { background: #a371f7; }
        .score-news { background: #f0883e; }

        /* 푸터 */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #484f58;
        }

        /* 네비게이션 */
        .nav {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }
        .nav a {
            color: #8b949e;
            text-decoration: none;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .nav a:hover { background: #21262d; color: #e1e4e8; }
        .nav a.active {
            background: #1f6feb;
            color: #fff;
        }

        /* 매수 버튼 */
        .buy-btn {
            background: #238636;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        .buy-btn:hover { background: #2ea043; }
        .premarket-btn {
            background: #1f6feb;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .premarket-btn:hover { background: #388bfd; }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            width: 380px;
            max-width: 90vw;
        }
        .modal h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #c9d1d9;
        }
        .modal label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 4px;
            margin-top: 12px;
        }
        .modal input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            color: #e1e4e8;
            font-size: 14px;
            outline: none;
        }
        .modal input:focus { border-color: #58a6ff; }
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal-cancel {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-confirm {
            background: #238636;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .modal-confirm:hover { background: #2ea043; }
        .modal-confirm:disabled { background: #30363d; color: #484f58; cursor: not-allowed; }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #484f58;
        }

        /* 정렬 */
        .sort-icon {
            font-size: 10px;
            color: #484f58;
            margin-left: 2px;
        }
        th[data-sort]:hover {
            color: #58a6ff;
        }
        th.sort-active .sort-icon {
            color: #58a6ff;
        }

        /* 검색 결과 없음 */
        .no-results {
            text-align: center;
            padding: 24px;
            color: #484f58;
            display: none;
        }

        /* 테이블 가로 스크롤 래퍼 */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 로딩 */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: #8b949e;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
            }
            header > div:last-child { width: 100%; text-align: left; }
            .container { padding: 12px; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .index-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .index-item .value { font-size: 16px; }
            .card { padding: 14px; }
            .card h2 { font-size: 14px; }

            /* 추천 테이블 컴팩트 */
            .rec-table th, .rec-table td { padding: 8px 6px; font-size: 13px; }

            /* 검색 */
            #search-input { width: 100% !important; margin-top: 8px; }
            .card > div:first-child {
                flex-direction: column;
                align-items: flex-start !important;
            }

        }

        @media (max-width: 480px) {
            header h1 { font-size: 17px; }
            .index-grid { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .index-item { padding: 8px 4px; }
            .index-item .value { font-size: 14px; }
            .index-item .label { font-size: 11px; }
            .sector-name { width: 42px; font-size: 12px; }
            .keyword-tag { font-size: 12px; padding: 3px 8px; }
            .rec-table th, .rec-table td { padding: 6px 4px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Auto Invest</h1>
            <span class="meta">미국 시장 기반 한국 종목 추천 | <span id="header-timestamp">로딩 중...</span></span>
            <nav class="nav">
                <a href="/" class="active">추천</a>
                <a href="/discover">발굴</a>
                <a href="/portfolio">포트폴리오</a>
                <span class="quick-trade-btns">
                    <button class="quick-buy-btn" onclick="qtOpenBuy()">빠른 매수</button>
                    <button class="quick-reserve-btn" onclick="qtOpenReserve()">예약 매수</button>
                </span>
            </nav>
        </div>
        <div style="text-align: right;">
            <form id="refresh-form" action="/refresh" method="post" style="display:inline;">
                <button type="submit" id="refresh-btn" class="refresh-btn">새로고침</button>
            </form>
            <div id="cache-info" style="font-size: 11px; color: #8b949e; margin-top: 6px; line-height: 1.8;"></div>
        </div>
    </header>

    <div class="container" id="main-content">
        <div class="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">추천 데이터를 불러오는 중...</div>
        </div>
    </div>

    <!-- 매수 모달 -->
    <div class="modal-overlay" id="buy-modal">
        <div class="modal">
            <h3 id="buy-modal-title">매수 주문</h3>
            <input type="hidden" id="buy-code">
            <input type="hidden" id="buy-name">
            <label>수량</label>
            <input type="number" id="buy-qty" value="1" min="1">
            <label>익절 %</label>
            <input type="number" id="buy-tp" value="4.0" step="0.5">
            <label>손절 %</label>
            <input type="number" id="buy-sl" value="-3.0" step="0.5">
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeBuyModal()">취소</button>
                <button class="modal-confirm" id="buy-confirm-btn" onclick="submitBuy()">매수</button>
            </div>
        </div>
    </div>

    <!-- 예약 모달 (시간외 / 장개시 공용) -->
    <div class="modal-overlay" id="reservation-modal">
        <div class="modal">
            <h3 id="reservation-modal-title">예약 매수</h3>
            <input type="hidden" id="reservation-code">
            <input type="hidden" id="reservation-name">
            <input type="hidden" id="reservation-type">
            <label>수량</label>
            <input type="number" id="reservation-qty" value="1" min="1">
            <label>익절 %</label>
            <input type="number" id="reservation-tp" value="4.0" step="0.5">
            <label>손절 %</label>
            <input type="number" id="reservation-sl" value="-3.0" step="0.5">
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeReservationModal()">취소</button>
                <button class="modal-confirm" id="reservation-confirm-btn" onclick="submitReservation()">예약</button>
            </div>
        </div>
    </div>

    <footer>
        Auto Invest &copy; 2026 | 데이터: yfinance + Google News RSS
    </footer>

    <script>
    // ── 유틸리티 ──
    function _cc(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
    function _pct(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
    function _esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ── 데이터 로딩 ──
    var _isLoading = false;

    function _loadData() {
        if (_isLoading) return;
        _isLoading = true;
        var btn = document.getElementById('refresh-btn');
        btn.disabled = true;

        fetch('/api/dashboard-data')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('header-timestamp').textContent = data.timestamp;
                _renderCacheInfo(data.cache_info);
                document.getElementById('main-content').innerHTML = _renderContent(data);
                _initTableSort();
            })
            .catch(function(err) {
                document.getElementById('main-content').innerHTML =
                    '<div class="loading-overlay"><div class="loading-text" style="color:#f85149;">데이터 로딩 실패: ' + err.message + '</div></div>';
            })
            .finally(function() {
                _isLoading = false;
                btn.disabled = false;
                btn.textContent = '새로고침';
            });
    }

    _loadData();

    function _renderCacheInfo(ci) {
        if (!ci) return;
        var html = '';
        if (ci.recommendation && ci.recommendation.time)
            html += '<div>추천 결과: ' + ci.recommendation.time + ' <span style="color:#58a6ff">(TTL ' + ci.recommendation.ttl + ')</span></div>';
        if (ci.etf_holdings && ci.etf_holdings.time)
            html += '<div>ETF 구성종목: ' + ci.etf_holdings.time + ' <span style="color:#58a6ff">(TTL ' + ci.etf_holdings.ttl + ')</span></div>';
        if (ci.stock_code && ci.stock_code.time)
            html += '<div>종목코드 매핑: ' + ci.stock_code.time + ' <span style="color:#58a6ff">(TTL ' + ci.stock_code.ttl + ')</span></div>';
        document.getElementById('cache-info').innerHTML = html;
    }

    function _renderContent(data) {
        var html = '';

        // 미국 지수 + 키워드
        html += '<div class="grid">';
        html += '<div class="card"><h2>미국 주요 지수</h2><div class="index-grid">';
        var ic = data.index_changes || {};
        for (var name in ic) {
            var pct = ic[name];
            html += '<div class="index-item"><div class="label">' + _esc(name) + '</div>'
                  + '<div class="value ' + _cc(pct) + '">' + _pct(pct) + '</div></div>';
        }
        html += '</div></div>';

        html += '<div class="card"><h2>뉴스 키워드 (' + (data.headline_count || 0) + '건 분석)</h2>';
        var kw = data.keyword_counts || [];
        if (kw.length) {
            html += '<div class="keyword-cloud">';
            kw.forEach(function(item) {
                html += '<span class="keyword-tag">' + _esc(item[0]) + '<span class="count">' + item[1] + '</span></span>';
            });
            html += '</div>';
        } else {
            html += '<div class="empty-state">감지된 키워드가 없습니다</div>';
        }
        html += '</div></div>';

        // 섹터 & 테마
        html += '<div class="grid" style="margin-bottom: 24px;">';
        html += _renderBarCard('섹터 ETF 등락률', data.sector_changes || [], 50);
        html += _renderBarCard('테마 ETF 등락률', data.theme_changes || [], 80);
        html += '</div>';

        // 추천 종목
        var recs = data.recommendations || [];
        html += '<div class="card">';
        html += '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">';
        html += '<h2 style="margin-bottom:0;">추천 종목 <span id="rec-count">' + recs.length + '</span>개</h2>';
        html += '<input type="text" id="search-input" placeholder="종목명 또는 코드 검색..." '
              + 'style="background:#0d1117; border:1px solid #30363d; border-radius:6px; padding:6px 12px; color:#e1e4e8; font-size:13px; width:220px; outline:none;" '
              + 'onfocus="this.style.borderColor=\'#58a6ff\'" onblur="this.style.borderColor=\'#30363d\'">';
        html += '</div>';

        if (recs.length) {
            html += '<div class="table-wrap"><table class="rec-table" id="rec-table"><thead><tr>';
            html += '<th style="width:50px; cursor:pointer;" data-sort="rank" data-type="num"># <span class="sort-icon">▼</span></th>';
            html += '<th style="cursor:pointer;" data-sort="name" data-type="str">종목 <span class="sort-icon"></span></th>';
            html += '<th style="width:80px; cursor:pointer;" data-sort="total" data-type="num">종합 <span class="sort-icon"></span></th>';
            html += '<th style="width:130px; cursor:pointer;" data-sort="sector" data-type="num">섹터 <span class="sort-icon"></span></th>';
            html += '<th style="width:130px; cursor:pointer;" data-sort="theme" data-type="num">테마 <span class="sort-icon"></span></th>';
            html += '<th style="width:130px; cursor:pointer;" data-sort="news" data-type="num">뉴스 <span class="sort-icon"></span></th>';
            html += '<th style="width:55px;">매수</th>';
            html += '<th style="width:130px;">예약매수</th>';
            html += '</tr></thead><tbody>';

            recs.forEach(function(rec, i) {
                var rank = i + 1;
                var rc = rank <= 3 ? 'rank-' + rank : 'rank-other';
                html += '<tr data-name="' + _esc(rec.name) + '" data-code="' + _esc(rec.code) + '"'
                      + ' data-rank="' + rank + '" data-total="' + rec.total_score + '"'
                      + ' data-sector="' + rec.sector_score + '" data-theme="' + rec.theme_score + '"'
                      + ' data-news="' + rec.news_score + '">';
                html += '<td><span class="rank ' + rc + '">' + rank + '</span></td>';
                html += '<td><a class="stock-link" href="https://finance.naver.com/item/main.naver?code=' + _esc(rec.code) + '" target="_blank" rel="noopener">'
                      + '<span class="stock-name">' + _esc(rec.name) + '</span>'
                      + '<span class="stock-code">' + _esc(rec.code) + '</span></a></td>';
                html += '<td style="font-weight:700; font-size:16px;">' + rec.total_score.toFixed(1) + '</td>';
                html += '<td><span class="score-bar score-sector" style="width:' + Math.round(rec.sector_score / 10 * 60) + 'px"></span>' + rec.sector_score.toFixed(1) + '</td>';
                html += '<td><span class="score-bar score-theme" style="width:' + Math.round(rec.theme_score / 10 * 60) + 'px"></span>' + rec.theme_score.toFixed(1) + '</td>';
                html += '<td><span class="score-bar score-news" style="width:' + Math.round(rec.news_score / 10 * 60) + 'px"></span>' + rec.news_score.toFixed(1) + '</td>';
                html += '<td><button class="buy-btn" onclick="openBuyModal(\'' + _esc(rec.code) + '\', \'' + _esc(rec.name) + '\')">매수</button></td>';
                html += '<td style="white-space:nowrap;">'
                      + '<button class="premarket-btn" onclick="openReservationModal(\'' + _esc(rec.code) + '\', \'' + _esc(rec.name) + '\', \'pre_market\')" title="08:30 장전 시간외">08:30</button> '
                      + '<button class="premarket-btn" style="background:#238636;" onclick="openReservationModal(\'' + _esc(rec.code) + '\', \'' + _esc(rec.name) + '\', \'market_open\')" title="09:00 장개시 시장가">09:00</button>'
                      + '</td>';
                html += '</tr>';
            });

            html += '</tbody></table></div>';
        } else {
            html += '<div class="empty-state">추천 종목이 없습니다. 미국 시장 데이터를 확인하세요.</div>';
        }
        html += '</div>';

        return html;
    }

    function _renderBarCard(title, items, nameWidth) {
        var html = '<div class="card"><h2>' + title + '</h2><ul class="sector-list">';
        items.forEach(function(item) {
            var name = item[0], pct = item[1];
            var absPct = Math.abs(pct);
            var barW = absPct < 6 ? (absPct / 6 * 100) : 100;
            html += '<li class="sector-item">'
                  + '<span class="sector-name" style="width:' + nameWidth + 'px;">' + _esc(name) + '</span>'
                  + '<div class="sector-bar-wrap"><div class="sector-bar ' + (pct >= 0 ? 'positive' : 'negative') + '" style="width:' + barW + '%"></div></div>'
                  + '<span class="sector-pct ' + _cc(pct) + '">' + _pct(pct) + '</span>'
                  + '</li>';
        });
        html += '</ul></div>';
        return html;
    }

    // ── 테이블 정렬 & 검색 초기화 ──
    function _initTableSort() {
        var table = document.getElementById('rec-table');
        if (!table) return;
        var tbody = table.querySelector('tbody');
        var searchInput = document.getElementById('search-input');
        var countEl = document.getElementById('rec-count');
        var headers = table.querySelectorAll('th[data-sort]');
        var currentSort = 'rank';
        var currentDir = 'asc';

        searchInput.addEventListener('input', function() {
            var q = this.value.toLowerCase();
            var visible = 0;
            tbody.querySelectorAll('tr').forEach(function(row) {
                var name = row.dataset.name.toLowerCase();
                var code = row.dataset.code;
                var match = name.includes(q) || code.includes(q);
                row.style.display = match ? '' : 'none';
                if (match) visible++;
            });
            countEl.textContent = visible;
        });

        headers.forEach(function(th) {
            th.style.cursor = 'pointer';
            th.addEventListener('click', function() {
                var col = th.dataset.sort;
                var type = th.dataset.type;

                if (currentSort === col) {
                    currentDir = currentDir === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort = col;
                    currentDir = 'asc';
                }

                headers.forEach(function(h) {
                    h.classList.remove('sort-active');
                    h.querySelector('.sort-icon').textContent = '';
                });
                th.classList.add('sort-active');
                th.querySelector('.sort-icon').textContent = currentDir === 'asc' ? '▲' : '▼';

                var rows = Array.from(tbody.querySelectorAll('tr'));
                rows.sort(function(a, b) {
                    var va, vb;
                    if (col === 'name') { va = a.dataset.name; vb = b.dataset.name; }
                    else { va = parseFloat(a.dataset[col]); vb = parseFloat(b.dataset[col]); }
                    var cmp = type === 'str' ? va.localeCompare(vb, 'ko') : va - vb;
                    return currentDir === 'asc' ? cmp : -cmp;
                });
                rows.forEach(function(row) { tbody.appendChild(row); });
            });
        });

        headers[0].classList.add('sort-active');
        headers[0].querySelector('.sort-icon').textContent = '▲';
    }

    // ── 매수 모달 ──
    function openBuyModal(code, name) {
        document.getElementById('buy-code').value = code;
        document.getElementById('buy-name').value = name;
        document.getElementById('buy-modal-title').textContent = '매수: ' + name + ' (' + code + ')';
        document.getElementById('buy-qty').value = 1;
        document.getElementById('buy-tp').value = 4.0;
        document.getElementById('buy-sl').value = -3.0;
        document.getElementById('buy-modal').classList.add('active');
    }

    function closeBuyModal() {
        document.getElementById('buy-modal').classList.remove('active');
    }

    function submitBuy() {
        var btn = document.getElementById('buy-confirm-btn');
        btn.disabled = true;
        btn.textContent = '주문 중...';

        var payload = {
            stock_code: document.getElementById('buy-code').value,
            stock_name: document.getElementById('buy-name').value,
            quantity: parseInt(document.getElementById('buy-qty').value),
            tp_pct: parseFloat(document.getElementById('buy-tp').value),
            sl_pct: parseFloat(document.getElementById('buy-sl').value)
        };

        fetch('/api/buy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                alert('매수 주문 완료: ' + payload.stock_name);
            } else {
                alert('매수 실패: ' + data.message);
            }
            closeBuyModal();
            btn.disabled = false;
            btn.textContent = '매수';
        })
        .catch(function(err) {
            alert('요청 오류: ' + err);
            btn.disabled = false;
            btn.textContent = '매수';
        });
    }

    // 모달 외부 클릭 시 닫기
    document.getElementById('buy-modal').addEventListener('click', function(e) {
        if (e.target === this) closeBuyModal();
    });
    document.getElementById('reservation-modal').addEventListener('click', function(e) {
        if (e.target === this) closeReservationModal();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') { closeBuyModal(); closeReservationModal(); }
    });

    // ── 예약 모달 ──
    var _resTypeLabels = {pre_market: '08:30 시간외', market_open: '09:00 장개시'};

    function openReservationModal(code, name, type) {
        document.getElementById('reservation-code').value = code;
        document.getElementById('reservation-name').value = name;
        document.getElementById('reservation-type').value = type;
        document.getElementById('reservation-modal-title').textContent =
            _resTypeLabels[type] + ' 예약: ' + name + ' (' + code + ')';
        document.getElementById('reservation-qty').value = 1;
        document.getElementById('reservation-tp').value = 4.0;
        document.getElementById('reservation-sl').value = -3.0;
        document.getElementById('reservation-modal').classList.add('active');
    }

    function closeReservationModal() {
        document.getElementById('reservation-modal').classList.remove('active');
    }

    function submitReservation() {
        var btn = document.getElementById('reservation-confirm-btn');
        btn.disabled = true;
        btn.textContent = '예약 중...';

        var payload = {
            stock_code: document.getElementById('reservation-code').value,
            stock_name: document.getElementById('reservation-name').value,
            quantity: parseInt(document.getElementById('reservation-qty').value),
            tp_pct: parseFloat(document.getElementById('reservation-tp').value),
            sl_pct: parseFloat(document.getElementById('reservation-sl').value),
            reservation_type: document.getElementById('reservation-type').value
        };

        fetch('/api/pre-market-reservation', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                var label = _resTypeLabels[payload.reservation_type] || '예약';
                alert(label + ' 완료: ' + payload.stock_name + ' ' + payload.quantity + '주');
            } else {
                alert('예약 실패: ' + data.message);
            }
            closeReservationModal();
            btn.disabled = false;
            btn.textContent = '예약';
        })
        .catch(function(err) {
            alert('요청 오류: ' + err);
            btn.disabled = false;
            btn.textContent = '예약';
        });
    }

    // 새로고침: form submit 대신 AJAX로 처리
    (function() {
        var form = document.getElementById('refresh-form');
        if (!form) return;

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (_isLoading) return;
            _isLoading = true;
            var btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.textContent = '갱신 중...';
            document.getElementById('main-content').innerHTML =
                '<div class="loading-overlay"><div class="loading-spinner"></div><div class="loading-text">새로운 데이터를 가져오는 중...</div></div>';

            fetch('/refresh', { method: 'POST' })
                .then(function() { return fetch('/api/dashboard-data'); })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('header-timestamp').textContent = data.timestamp;
                    _renderCacheInfo(data.cache_info);
                    document.getElementById('main-content').innerHTML = _renderContent(data);
                    _initTableSort();
                })
                .catch(function(err) {
                    document.getElementById('main-content').innerHTML =
                        '<div class="loading-overlay"><div class="loading-text" style="color:#f85149;">갱신 실패: ' + err.message + '</div></div>';
                })
                .finally(function() {
                    _isLoading = false;
                    btn.disabled = false;
                    btn.textContent = '새로고침';
                });
        });
    })();
    </script>
